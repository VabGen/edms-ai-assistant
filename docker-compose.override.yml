services:
  app:
    build:
      target: runtime
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      LOGGING_LEVEL: DEBUG
      LLM_GENERATIVE_URL: http://host.docker.internal:11434/v1
    volumes:
      - ./edms_ai_assistant:/app/edms_ai_assistant:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
    command: >
      uvicorn edms_ai_assistant.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/edms_ai_assistant
      --log-level debug

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"